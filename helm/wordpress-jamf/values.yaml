# Global namespace
namespace: wordpress-jamf-test

# Database configuration
mariadb:
  enabled: true
  replicaCount: 1
  image:
    repository: mariadb
    tag: "10.6.4-focal"
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  storage:
    size: 1Gi
  
  auth:
    rootPassword: jamf-cody-test
    database: jamf-test
    username: jamf-cody
    password: jamf-test-password

# WordPress configuration
wordpress:
  enabled: true
  replicaCount: 1
  image:
    repository: wordpress
    tag: latest
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  
  storage:
    size: 1Gi
  
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
