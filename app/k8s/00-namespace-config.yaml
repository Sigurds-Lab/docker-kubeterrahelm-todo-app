apiVersion: v1
kind: Namespace
metadata:
  name: todo-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: todo-app
data:
  DB_USER: "postgres"
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "todos"
  REDIS_HOST: "cache"
  REDIS_PORT: "6379"
  NODE_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: todo-app
type: Opaque
stringData:
  DB_PASSWORD: "postgres_password"
