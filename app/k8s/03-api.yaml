apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: todo-app
  labels:
    app: api
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
        component: backend
    spec:
      containers:
        - name: api
          image: node:18-alpine
          command: ["sh", "-c", "cd /app && npm install && npm start"]
          workingDir: /app
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: api-code
              mountPath: /app
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
      initContainers:
        - name: wait-for-db
          image: busybox:1.35
          command: ['sh', '-c', "until nc -z db 5432; do echo waiting for db; sleep 2; done"]
      volumes:
        - name: api-code
          configMap:
            name: api-code
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: todo-app
  labels:
    app: api
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: api
